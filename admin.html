<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expert Center | Content Studio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#070a12;--card:rgba(255,255,255,.075);--text:#f5f8ff;--muted:#aab8d4;--line:rgba(255,255,255,.14);--blue:#58a6ff;--cyan:#6ffaff;--green:#3ee6a5}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(88,166,255,.25),transparent 30%),radial-gradient(circle at 80% 30%,rgba(111,250,255,.14),transparent 30%),#070a12;color:var(--text);line-height:1.65;min-height:100vh}
    a{color:inherit;text-decoration:none}.header{display:flex;justify-content:space-between;align-items:center;padding:18px 7vw;border-bottom:1px solid var(--line);background:rgba(7,10,18,.78);backdrop-filter:blur(18px)}
    .brand{display:flex;align-items:center;gap:13px}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,var(--cyan),var(--blue));display:grid;place-items:center;color:#06101d;font-weight:1000}.brand strong{letter-spacing:2px;display:block}.brand small{color:var(--muted)}
    .btn{display:inline-flex;border:0;border-radius:14px;padding:13px 18px;font-weight:1000;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#06101d}
    .ghost{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text)}
    main{padding:70px 7vw}.hero{max-width:980px;margin-bottom:34px}.kicker{color:var(--cyan);font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:1000}.hero h1{font-size:clamp(42px,6vw,80px);line-height:.92;letter-spacing:-3px;text-transform:uppercase;margin:14px 0}.hero p{color:var(--muted);font-size:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:30px;padding:30px;box-shadow:0 25px 80px rgba(0,0,0,.35)}
    h2{font-size:30px;margin-bottom:12px}label{display:block;margin-top:15px;font-weight:900}input,textarea{width:100%;margin-top:7px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);font:inherit}textarea{min-height:135px}.output{min-height:500px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.hint{margin-top:16px;color:var(--muted)}.success{margin-top:16px;color:var(--green);font-weight:900}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.header{padding:16px 5vw}main{padding:55px 5vw}}
  </style>
</head>
<body>
  <header class="header">
    <a class="brand" href="index.html"><span class="logo">EC</span><span><strong>EXPERT CENTER</strong><small>Content Studio</small></span></a>
    <a class="btn ghost" href="index.html">Back to Website</a>
  </header>

  <main>
    <section class="hero">
      <p class="kicker">Private Content Studio</p>
      <h1>Create a polished blog entry.</h1>
      <p>Paste the finished blog text below, generate the entry, then place it into the article list.</p>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Blog Details</h2>
        <label>Title <input id="title" placeholder="Example: What I Learned From Practicing Excel"></label>
        <label>Date <input id="date" type="date"></label>
        <label>Category <input id="category" placeholder="Learning Notes"></label>
        <label>Tags <input id="tags" placeholder="Excel, Data Entry, Office Skills"></label>
        <label>Short Description <textarea id="description" placeholder="Short summary for the article card."></textarea></label>
        <label>Full Blog Content <textarea id="content" placeholder="Paste the final blog post here."></textarea></label>
        <br><br>
        <button class="btn" onclick="makePost()">Generate Entry</button>
        <p class="success" id="status"></p>
      </div>

      <div class="panel">
        <h2>Generated Entry</h2>
        <textarea id="output" class="output" readonly></textarea>
        <p class="hint">Copy the generated entry and place it at the top of the article list.</p>
      </div>
    </section>
  </main>

  <script>
    function val(id){return document.getElementById(id).value.trim()}
    function makePost(){
      const entry={
        title: val("title") || "New Blog Post",
        date: val("date") || new Date().toISOString().slice(0,10),
        category: val("category") || "Career Growth",
        description: val("description") || "A professional article from Expert Center.",
        tags: val("tags").split(",").map(t=>t.trim()).filter(Boolean),
        content: val("content") || "Write the full blog content here."
      };
      document.getElementById("output").value=JSON.stringify(entry,null,2)+",";
      document.getElementById("status").textContent="Entry generated successfully.";
    }
  </script>
</body>
</html>
